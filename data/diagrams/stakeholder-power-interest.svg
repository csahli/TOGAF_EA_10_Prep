<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 220" class="svg-diagram" role="img" aria-label="Stakeholder Power versus Interest matrix: four quadrants — Keep Satisfied, Key Players, Minimal Effort, Keep Informed">
  <rect x="60"  y="20"  width="130" height="80" class="sm-q sm-ks" />
  <text x="125" y="50"  class="sm-q-h">Keep Satisfied</text>
  <text x="125" y="68"  class="sm-q-s">high power</text>
  <text x="125" y="82"  class="sm-q-s">low interest</text>
  <rect x="190" y="20"  width="130" height="80" class="sm-q sm-kp" />
  <text x="255" y="50"  class="sm-q-h">Key Players</text>
  <text x="255" y="68"  class="sm-q-s">high power</text>
  <text x="255" y="82"  class="sm-q-s">high interest · manage closely</text>
  <rect x="60"  y="100" width="130" height="80" class="sm-q sm-me" />
  <text x="125" y="130" class="sm-q-h">Minimal Effort</text>
  <text x="125" y="148" class="sm-q-s">low power</text>
  <text x="125" y="162" class="sm-q-s">low interest</text>
  <rect x="190" y="100" width="130" height="80" class="sm-q sm-ki" />
  <text x="255" y="130" class="sm-q-h">Keep Informed</text>
  <text x="255" y="148" class="sm-q-s">low power</text>
  <text x="255" y="162" class="sm-q-s">high interest</text>
  <text x="40"  y="100" class="sm-axis" transform="rotate(-90 40 100)">Power</text>
  <text x="190" y="205" class="sm-axis" text-anchor="middle">Interest</text>
</svg>
